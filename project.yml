name: SignalQuest
options:
  developmentLanguage: fr
  bundleIdPrefix: fr.signalquest
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
configs:
  Debug: debug
  Staging: release
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "835X2977R7"
packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    exactVersion: 2.14.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 12.13.0
targets:
  SignalQuest:
    type: application
    platform: iOS
    sources:
      - path: SignalQuestApp
        excludes:
          - Resources/**
          - .claude/**
          - SignalQuest.entitlements
      - path: SignalQuestApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: SignalQuestApp/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: SignalQuestApp/Resources/Fonts
        buildPhase: resources
      - path: SignalQuestApp/Resources/market_registry_fallback.json
        buildPhase: resources
      - path: SignalQuestApp/Resources/market_location_areas.json
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios
        PRODUCT_NAME: SignalQuest
        INFOPLIST_FILE: SignalQuestApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: SignalQuestApp/SignalQuest.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
      configs:
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.beta
    preBuildScripts:
      - name: Validate Build Environment
        path: ci_scripts/validate_build_environment.sh
        basedOnDependencyAnalysis: false
    dependencies:
      - package: LiveKit
        product: LiveKit
      # Firebase (Analytics inclut FirebaseCore, importé dans AppDelegate/SignalQuestApp).
      # NB: doit rester dans project.yml — sinon `xcodegen generate` retire le lien.
      - package: Firebase
        product: FirebaseAnalytics
      # FirebaseMessaging est importé dans AppDelegate (push FCM) — doit aussi être
      # déclaré ici, sinon `xcodegen generate` retire le lien (module non résolu).
      - package: Firebase
        product: FirebaseMessaging
      # Extension widget (embarquée dans l'app).
      - target: SignalQuestWidget
        embed: true
  SignalQuestWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SignalQuestWidget
      - path: SignalQuestApp/Core/Shared/WidgetSharedStore.swift
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: SignalQuestWidget/Info.plist
      properties:
        CFBundleDisplayName: SignalQuest
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.widget
        PRODUCT_NAME: SignalQuestWidget
        CODE_SIGN_ENTITLEMENTS: SignalQuestWidget/SignalQuestWidget.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
      configs:
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.beta.widget
  SignalQuestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SignalQuestTests
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.tests
        INFOPLIST_FILE: SignalQuestTests/Info.plist
      configs:
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.beta.tests
    dependencies:
      - target: SignalQuest
  SignalQuestUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SignalQuestUITests
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.uitests
        INFOPLIST_FILE: SignalQuestUITests/Info.plist
      configs:
        Staging:
          PRODUCT_BUNDLE_IDENTIFIER: fr.signalquest.ios.beta.uitests
    dependencies:
      - target: SignalQuest
schemes:
  SignalQuest:
    build:
      targets:
        SignalQuest: all
    test:
      config: Debug
      targets:
        - SignalQuestTests
        - SignalQuestUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
  SignalQuest Beta:
    build:
      targets:
        SignalQuest: all
    test:
      config: Staging
      targets:
        - SignalQuestTests
        - SignalQuestUITests
      gatherCoverageData: true
    run:
      config: Staging
    archive:
      config: Staging
